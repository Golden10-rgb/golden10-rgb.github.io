<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2K REBBORN</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: Arial, sans-serif;
    background: black;
    color: white;
    min-height: 100vh;
    overflow-x: hidden;
  }
  
  /* Video background */
  #bg-video {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: -1;
  }
  
  /* Main container - hide at start */
  #sensitivityBox {
    display: block;
    opacity: 0;
    transition: opacity 1s ease;
    padding: 20px;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }
  
  /* Top header */
  .top-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
  }
  
  .logo {
    font-size: 24px;
    font-weight: bold;
    color: #00ff88;
    text-shadow: 0 0 10px #00ff88;
  }
  
  .logo-btn {
    background: transparent;
    border: 2px solid #00ff88;
    color: #00ff88;
    padding: 8px 20px;
    border-radius: 25px;
    font-weight: bold;
    box-shadow: 0 0 15px #00ff88;
  }
  
  /* Main content */
  .main-title {
    text-align: center;
    font-size: 36px;
    font-weight: 900;
    color: #00ff88;
    text-shadow: 0 0 20px #00ff88;
    margin-bottom: 10px;
  }
  
  .subtitle {
    text-align: center;
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 20px;
  }
  
  .description {
    text-align: center;
    color: #ccc;
    line-height: 1.6;
    max-width: 400px;
    margin: 0 auto 30px;
    font-size: 14px;
  }
  
  /* Input box */
  .input-container {
    border: 2px solid #00ff88;
    border-radius: 15px;
    padding: 20px;
    background: rgba(0,0,0,0.5);
    box-shadow: 0 0 20px rgba(0,255,136,0.3);
    max-width: 350px;
    margin: 0 auto;
  }
  
  input[type="text"] {
    width: 100%;
    padding: 15px;
    background: #1a1a1a;
    border: none;
    border-radius: 10px;
    color: white;
    margin-bottom: 15px;
    font-size: 16px;
  }
  
  input::placeholder {
    color: #666;
  }
  
  .generate-btn {
    width: 100%;
    padding: 15px;
    background: #00ff88;
    border: none;
    border-radius: 10px;
    color: black;
    font-weight: bold;
    font-size: 18px;
    box-shadow: 0 0 20px #00ff88;
  }
</style>
</head>
<body>

<!-- 1. VIDEO PLAY FIRST -->
<video id="bg-video" autoplay muted playsinline>
  <source src="intro.mp4" type="video/mp4">
</video>

<!-- 2. YOUR FULL PAGE - HIDE AT START -->
<div id="sensitivityBox">
  
  <!-- Top header -->
  <div class="top-header">
    <div class="logo">2k!<br>REBBORN</div>
    <button class="logo-btn">2K REBBORN</button>
  </div>
  
  <!-- Main content -->
  <h1 class="main-title">BECOME PRO</h1>
  <p class="subtitle">WITH Rebborngames</p>
  
  <p class="description">
    Unlock powerful Free Fire sensitivity settings.<br>
    Improve your aim, master headshots and<br>
    become a stronger player using tested sensitivity<br>
    recommendations from Nigeria gaming<br>
    creator,2K! Rebborn.
  </p>
  
  <!-- Input box -->
  <div class="input-container">
    <input type="text" placeholder="Type phone name: iphone 13, tecno">
    <button class="generate-btn">Generate Settings</button>
  </div>
  
</div>

<!-- 3. VIDEO FINISH → SHOW PAGE + UNLIMITED GENERATOR -->
<script>
const video = document.getElementById('bg-video');
const box = document.getElementById('sensitivityBox');
const generateBtn = document.querySelector('.generate-btn');
const phoneInput = document.querySelector('input[type="text"]');

video.addEventListener('ended', function() {
  box.style.opacity = '1';
});

// UNLIMITED SENSITIVITY GENERATOR
generateBtn.addEventListener('click', function() {
  const phoneName = phoneInput.value.trim();
  
  if(phoneName === '') {
    alert('Type your phone name first boss! Example: iphone 13, tecno, infinix');
    return;
  }
  
  // Generate random sensitivity 40-200. Unlimited = new random every click
  function randomSens() {
    return Math.floor(Math.random() * 161) + 40; // 40 to 200
  }
  
  const settings = {
    General: randomSens(),
    RedDot: randomSens(),
    Scope2x: randomSens(),
    Scope4x: randomSens(),
    Sniper: randomSens(),
    FreeCamera: randomSens()
  };
  
  // Show results - replace the input box with resultsdocument.querySelector('.input-container').innerHTML = `
    <h3 style="color:#00ff88; text-align:center; margin-bottom:15px;">
      ${phoneName.toUpperCase()} SETTINGS 🔥
    </h3>
    <div style="text-align:left; line-height:2.5;">
      <p><b>General:</b> ${settings.General}</p>
      <p><b>Red Dot:</b> ${settings.RedDot}</p>
      <p><b>2x Scope:</b> ${settings.Scope2x}</p>
      <p><b>4x Scope:</b> ${settings.Scope4x}</p>
      <p><b>Sniper:</b> ${settings.Sniper}</p>
      <p><b>Free Camera:</b> ${settings.FreeCamera}</p>
    </div>
    <button class="generate-btn" onclick="location.reload()">Generate New One</button>
    <p style="font-size:12px; color:#999; margin-top:10px; text-align:center;">
      Click "Generate New One" for unlimited different settings
    </p>
  `;
});
</script>
