 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2k! REBORN | Free Fire AI Sensitivity Calc ulator</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box;}
body {
background: linear-gradient(135deg, #000 0%, #0a0a0a 100%);
color: #fff;
font-family: 'Poppins', sans-serif;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}
.top-bar {
width:100%;
max-width:700px;
padding:20px 0;
display:flex;
justify-content:space-between;
align-items:center;
}
.brand {
font-size:1.5rem;
font-weight:700;
color:#00ff88;
text-shadow:0 0 20px #00ff88;
}
.badge-btn {
padding:8px 16px;
border:2px solid #00ff88;
border-radius:20px;
color:#00ff88;
text-decoration:none;
font-size:0.9rem;
transition:0.3s;
}
.badge-btn:hover {
background:#00ff88;
color:#000;
box-shadow:0 0 20px #00ff88;
}
.hero {
text-align:center;
margin:40px 0;
}
.hero h1 {
font-size:2.5rem;
color:#00ff88;
text-shadow:0 0 30px #00ff88;
margin-bottom:10px;
}
.hero h2 {
font-size:1.5rem;
color:#fff;
}
.hero p {
margin-top:15px;
color:#ccc;
max-width:500px;
}
.calculator-box {
background:rgba(0,255,136,0.05);
border:2px solid #00ff88;
border-radius:15px;
padding:30px;
max-width:500px;
width:100%;
margin-top:30px;
box-shadow:0 0 40px rgba(0,255,136,0.3);
}
.calculator-box input {
width:100%;
padding:15px;
border-radius:10px;
border:2px solid #00ff88;
background:#111;
color:#fff;
font-size:1rem;
outline:none;
margin-bottom:15px;
}
.calculator-box input:focus {
box-shadow:0 0 20px #00ff88;
}
.calculator-box button {
width:100%;
padding:15px;
border-radius:10px;
border:none;
background:#00ff88;
color:#000;
font-weight:700;
font-size:1.1rem;
cursor:pointer;
transition:0.3s;
}
.calculator-box button:hover {
box-shadow:0 0 30px #00ff88;
transform:scale(1.02);
}
.result {
margin-top:20px;
display:none;
}
.result.show {display:block;}
.result h3 {
color:#00ff88;
margin-bottom:15px;
text-align:center;
}
.sensitivity-grid {
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}
.sense-item {
background:rgba(0,255,136,0.1);
padding:12px;
border-radius:8px;
border:1px solid #00ff88;
display:flex;
justify-content:space-between;
}
footer {
margin-top:50px;
text-align:center;
color:#666;
font-size:0.9rem;
}
</style>
</head>
<body>
<div class="top-bar">
<div class="brand">2k! REBORN</div>
<a href="#" class="badge-btn">2K REBORN</a>
</div>

<div class="hero">
<h1>BECOME PRO</h1>
<h2>WITH 2k! REBORN</h2>
<p>Unlock powerful Free Fire sensitivity settings. Improve your aim, master headshots, using tested AI recommendations.</p>
</div>

<div class="calculator-box">
<input type="text" id="phoneInput" placeholder="Type phone name: iphone 13, tecno spark 20...">
<button onclick="generate()">Generate AI Settings</button>

<div id="result" class="result">
<h3>AI Sensitivity Settings</h3>
<div class="sensitivity-grid">
<div class="sense-item"><span>General:</span><span id="g"></span></div>
<div class="sense-item"><span>Red Dot:</span><span id="r"></span></div>
<div class="sense-item"><span>2x Scope:</span><span id="s2"></span></div>
<div class="sense-item"><span>4x Scope:</span><span id="s4"></span></div>
<div class="sense-item"><span>Sniper:</span><span id="sn"></span></div>
<div class="sense-item"><span>Free Look:</span><span id="f"></span></div>
</div>
</div>
</div>

<footer>
© 2026 2k! REBORN | JokkieNames style hub
</footer>

<script>
function generate(){
let phone = document.getElementById('phoneInput').value.toLowerCase();
let base = 90;

// AI formula based on phone name
if(phone.includes('iphone')) base = 95;
if(phone.includes('samsung')) base = 92;
if(phone.includes('tecno') || phone.includes('infinix')) base = 88;
if(phone.includes('redmi') || phone.includes('poco')) base = 90;

document.getElementById('g').innerText = base;
document.getElementById('r').innerText = base - 5;
document.getElementById('s2').innerText = base - 8;
document.getElementById('s4').innerText = base - 12;
document.getElementById('sn').innerText = base - 15;
document.getElementById('f').innerText = base - 10;

document.getElementById('result').classList.add('show');
}
</script>
</body>
</html>
