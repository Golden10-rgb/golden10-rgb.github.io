  if(!baseSettings[deviceName]) {
    let hash = 0;
    for(let i = 0; i < deviceName.length; i++) {
      hash = deviceName.charCodeAt(i) + ((hash << 5) - hash);
    }
    function randFromHash(seed) {
      const x = Math.sin(seed) * 10000;
      return x - Math.floor(x);
    }
    baseSettings[deviceName] = {
      General: Math.floor(randFromHash(hash) * 52) + 85,
      RedDot: Math.floor(randFromHash(hash + 1) * 71) + 90,
      Scope2x: Math.floor(randFromHash(hash + 2) * 75) + 75,
      Scope4x: Math.floor(randFromHash(hash + 3) * 86) + 80,
      Sniper: Math.floor(randFromHash(hash + 4) * 11) + 40,
      FreeCamera: Math.floor(randFromHash(hash + 5) * 15) + 130
    };
  }
  return baseSettings[deviceName];
}

const searchInput = document.getElementById('searchInput');
const suggestions = document.getElementById('suggestions');
const resultsList = document.getElementById('resultsList');
const generateBtn = document.getElementById('generateBtn');
let selectedDevice = '';

searchInput.addEventListener('input', function() {
  const searchTerm = this.value.toLowerCase().trim();
  suggestions.innerHTML = '';
  resultsList.innerHTML = '';
  generateBtn.style.display = 'none';

  if(searchTerm === '') return;

  const matched = realDevices.filter(device =>
    device.toLowerCase().includes(searchTerm)
  );

  if(matched.length > 0) {
    matched.slice(0, 30).forEach(device => {
      const div = document.createElement('div');
      div.className = 'suggestion-item';
      div.textContent = device;
      div.onclick = () => {
        selectedDevice = device;
        searchInput.value = device;
        suggestions.innerHTML = '';
        generateBtn.style.display = 'block';
      };
      suggestions.appendChild(div);
    });
  } else {
    suggestions.innerHTML = `<div class="error-msg">⚠️ Wrong input device not generated, if this error continues contact 2K! Rebborn</div>`;
  }
});

generateBtn.addEventListener('click', () => {
  if(selectedDevice) {
    showSensitivity(selectedDevice);
    generateBtn.style.display = 'none';
  }
});

// show sensitivity when generate clicked
function showSensitivity(deviceName) {
  suggestions.innerHTML = '';
  searchInput.value = deviceName;
  const settings = getBaseSettings(deviceName);

  resultsList.innerHTML = `
    <h3 style="color:#00ff88; text-align:center; margin-bottom:15px; text-shadow:0 0 10px #00ff88;">
      ${deviceName.toUpperCase()} - PRO 🔥
    </h3>
    <p style="text-align:center; color:#66ffaa; font-size:14px; margin-bottom:20px;">Locked Range Settings</p>
    <div>
      <div class="phone-item"><b>General:</b> ${settings.General}</div>
      <div class="phone-item"><b>Red Dot:</b> ${settings.RedDot}</div>
      <div class="phone-item"><b>2x Scope:</b> ${settings.Scope2x}</div>
      <div class="phone-item"><b>4x Scope:</b> ${settings.Scope4x}</div>
      <div class="phone-item"><b>Sniper:</b> ${settings.Sniper}</div>
      <div class="phone-item"><b>Free Camera:</b> ${settings.FreeCamera}</div>
    </div>
  `;
}
