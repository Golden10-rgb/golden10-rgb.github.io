<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2K REBBORN</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #000;
    color: white;
    min-height: 100vh;
    padding: 25px 20px;
  }
  
  /* Top header */
  .top-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 50px;
  }
  
  .logo {
    font-size: 28px;
    font-weight: 900;
    color: #00ff88;
    text-shadow: 0 0 15px #00ff88, 0 0 30px #00ff88;
    line-height: 1.2;
  }
  
  .logo-btn {
    background: transparent;
    border: 3px solid #00ff88;
    color: #00ff88;
    padding: 12px 35px;
    border-radius: 50px;
    font-weight: bold;
    font-size: 16px;
    box-shadow: 0 0 20px #00ff88, inset 0 0 10px rgba(0,255,136,0.2);
    flex: 1;
    margin-left: 15px;
    max-width: 250px;
  }
  
  /* Main content */
  .main-title {
    text-align: center;
    font-size: 42px;
    font-weight: 900;
    color: #00ff88;
    text-shadow: 0 0 25px #00ff88, 0 0 50px #00ff88;
    margin-bottom: 15px;
    letter-spacing: 1px;
  }
  
  .subtitle {
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 25px;
    color: white;
  }
  
  .description {
    text-align: center;
    color: #ccc;
    line-height: 1.8;
    max-width: 420px;
    margin: 0 auto 40px;
    font-size: 15px;
  }
  
  /* Input box container */
  .input-container {
    border: 3px solid #00ff88;
    border-radius: 25px;
    padding: 30px 25px;
    background: rgba(0,255,136,0.05);
    box-shadow: 0 0 30px rgba(0,255,136,0.4);
    max-width: 380px;
    margin: 0 auto;
  }
  
  input[type="text"] {
    width: 100%;
    padding: 18px;
    background: #111;
    border: 2px solid #00ff88;
    border-radius: 15px;
    color: white;
    margin-bottom: 20px;
    font-size: 16px;
    outline: none;
    box-shadow: 0 0 15px rgba(0,255,136,0.3);
  }
  
  input::placeholder {
    color: #666;
  }
  
  input:focus {
    box-shadow: 0 0 25px #00ff88;
    border-color: #00ff88;
  }
  
  .generate-btn {
    width: 100%;
    padding: 18px;
    background: #00ff88;
    border: none;
    border-radius: 15px;
    color: black;
    font-weight: 900;
    font-size: 18px;
    box-shadow: 0 0 30px #00ff88;
    cursor: pointer;
  }
  
  .generate-btn:active {
    transform: scale(0.98);
  }
  
  /* Results style */
  .result-title {
    color: #00ff88;
    text-align: center;
    margin-bottom: 20px;
    font-size: 22px;
    text-shadow: 0 0 10px #00ff88;
  }
  
  .result-item {
    padding: 12px 0;
    border-bottom: 1px solid rgba(0,255,136,0.2);
    font-size: 18px;
  }
  
  .result-item b {
    color: #00ff88;
  }
</style>
</head>
<body>

<div id="sensitivityBox">
  
  <!-- Top header -->
  <div class="top-header">
    <div class="logo">2k!<br>REBBORN</div>
    <button class="logo-btn">2K REBBORN</button>
  </div>
  
  <!-- Main content -->
  <h1 class="main-title">BECOME PRO</h1>
  <p class="subtitle">WITH Rebborngames</p>
  
  <p class="description">
    Unlock powerful Free Fire sensitivity settings.<br>
    Improve your aim, master headshots and<br>
    become a stronger player using tested sensitivity<br>
    recommendations from Nigeria gaming<br>
    creator, 2K! Rebborn.
  </p>
  
  <!-- Input box -->
  <div class="input-container">
    <input type="text" id="phoneInput" placeholder="Type phone name: iphone 13, tecno">
    <button class="generate-btn" id="generateBtn">Generate Settings</button>
  </div>
  
</div>

<!-- UNLIMITED SENSITIVITY FOR ALL DEVICES -->
<script>
const generateBtn = document.getElementById('generateBtn');
const phoneInput = document.getElementById('phoneInput');

generateBtn.addEventListener('click', function() {
  const phoneName = phoneInput.value.trim();
  
  if(phoneName === '') {
    alert('Type your phone name first boss! Example: iphone 13, tecno, infinix, samsung');
    return;
  }
  
  // UNLIMITED = Random 50-200 for ALL devices
  function randomSens() {
    return Math.floor(Math.random() * 151) + 50; // 50 to 200
  }
  
  const settings = {
    General: randomSens(),
    RedDot: randomSens(),
    Scope2x: randomSens(),
    Scope4x: randomSens(),
    Sniper: randomSens(),
    FreeCamera: randomSens()
  };
  
  // Show results with glow
  document.querySelector('.input-container').innerHTML = `
    <h3 class="result-title">${phoneName.toUpperCase()} SETTINGS 🔥</h3>
    <div style="text-align:left;">
      <div class="result-item"><b>General:</b> ${settings.General}</div>
      <div class="result-item"><b>Red Dot:</b> ${settings.RedDot}</div>
      <div class="result-item"><b>2x Scope:</b> ${settings.Scope2x}</div>
      <div class="result-item"><b>4x Scope:</b> ${settings.Scope4x}</div>
      <div class="result-item"><b>Sniper:</b> ${settings.Sniper}</div>
      <div class="result-item" style="border-bottom:none;"><b>Free Camera:</b> ${settings.FreeCamera}</div>
    </div>
    <button class="generate-btn" style="margin-top:25px;" onclick="location.reload()">Generate New One</button>
    <p style="font-size:12px; color:#999; margin-top:15px; text-align:center;">
      Unlimited settings for ALL devices - Click again for new ones
    </p>
  `;
});

// Allow Enter key to generate
phoneInput.addEventListener('keypress', function(e) {
  if(e.key === 'Enter') generateBtn.click();
});
</script>

</body>
</html>
