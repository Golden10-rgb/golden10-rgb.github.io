<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iPhone 8 Plus Sensitivity | 2ᴋ! ʀᴇʙᴏʀɴꨄ</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #000 0%, #1a0a00 100%);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
    }
    .header {
      padding: 20px;
      border-bottom: 1px solid #222;
    }
    .brand {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      color: #ff6600;
      text-shadow: 0 0 15px #ff6600;
      font-weight: 900;
      text-decoration: none;
    }
    .container {
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
    }
    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.2rem;
      text-align: center;
      margin-bottom: 10px;
      text-shadow: 0 0 20px #ff6600;
    }
    .subtitle {
      text-align: center;
      opacity: 0.7;
      margin-bottom: 40px;
    }
    .sensi-table {
      background: #111;
      border-radius: 15px;
      padding: 25px;
      border: 1px solid #333;
      box-shadow: 0 0 25px rgba(255, 102, 0, 0.2);
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 0;
      border-bottom: 1px solid #222;
    }
    .row:last-child { border-bottom: none; }
    .label {
      font-weight: 600;
      font-size: 1.1rem;
    }
    .value-box {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .value {
      background: #1a1a1a;
      padding: 8px 15px;
      border-radius: 8px;
      font-family: 'Orbitron', sans-serif;
      font-size: 1.2rem;
      color: #ff8800;
      min-width: 50px;
      text-align: center;
    }
    .copy-btn {
      background: #ff6600;
      color: #000;
      border: none;
      padding: 8px 15px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-btn:hover {
      box-shadow: 0 0 15px #ff6600;
      transform: scale(1.05);
    }
    .note {
      margin-top: 30px;
      padding: 15px;
      background: #1a0a00;
      border-left: 3px solid #ff6600;
      border-radius: 5px;
      font-size: 0.9rem;
      opacity: 0.8;
    }
    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
      .value { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <a href="/index.html" class="brand">2ᴋ! ʀᴇʙᴏʀɴꨄ</a>
  </div>
  
  <div class="container">
    <h1>iPhone 8 Plus</h1>
    <p class="subtitle">Best Headshot Sensitivity 2026</p>
    
    <div class="sensi-table">
      <div class="row">
        <div class="label">General</div>
        <div class="value-box">
          <div class="value" id="general">95</div>
          <button class="copy-btn" onclick="copyVal('general')">Copy</button>
        </div>
      </div>
      <div class="row">
        <div class="label">Red Dot</div>
        <div class="value-box">
          <div class="value" id="reddot">92</div>
          <button class="copy-btn" onclick="copyVal('reddot')">Copy</button>
        </div>
      </div>
      <div class="row">
        <div class="label">2x Scope</div>
        <div class="value-box">
          <div class="value" id="scope2x">85</div>
          <button class="copy-btn" onclick="copyVal('scope2x')">Copy</button>
        </div>
      </div>
      <div class="row">
        <div class="label">4x Scope</div>
        <div class="value-box">
          <div class="value" id="scope4x">75</div>
          <button class="copy-btn" onclick="copyVal('scope4x')">Copy</button>
        </div>
      </div>
      <div class="row">
        <div class="label">AWM Scope</div>
        <div class="value-box">
          <div class="value" id="awm">65</div>
          <button class="copy-btn" onclick="copyVal('awm')">Copy</button>
        </div>
      </div>
      <div class="row">
        <div class="label">Free Look</div>
        <div class="value-box">
          <div class="value" id="freelook">80</div>
          <button class="copy-btn" onclick="copyVal('freelook')">Copy</button>
        </div>
      </div>
    </div>
    
    <div class="note">
      <strong>Tip:</strong> These sensis are tested for headshots on iPhone 8 Plus 60Hz. 
      Go to Settings > Sensitivity > paste these numbers. Adjust ±2 if it feels too fast/slow.
    </div>
  </div>
  
  <script>
    function copyVal(id) {
      const val = document.getElementById(id).innerText;
      navigator.clipboard.writeText(val);
      event.target.innerText = "Copied!";
      setTimeout(() => { event.target.innerText = "Copy"; }, 1500);
    }
  </script>
</body>
</html>
