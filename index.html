<script>
function generate() {
  let phone = document.getElementById('phone').value.toLowerCase().trim();
  let result = document.getElementById('result');

  if(phone === "") {
    result.innerHTML = '<p>⚠️ Type your device name first</p>';
    result.style.display = 'block';
    return;
  }

  let secretSalt = 2026; 
  let unique = phone + Date.now() + Math.random() + secretSalt;
  
  let hash = 0;
  for(let i = 0; i < unique.length; i++) {
    hash = unique.charCodeAt(i) + ((hash << 5) - hash);
  }
  
  let seed = Math.abs(hash);
  let general = 82 + (seed % 18);
  let redDot = general - 3 - (seed % 7);
  let scope2x = general - 8 - (seed % 5);
  let scope4x = general - 13 - (seed % 5);
  let sniper = general - 18 - (seed % 4);
  let freeLook = general - 32 - (seed % 6);

  if(phone.includes("iphone")) {
    general += 2; redDot += 2;
  } else if(phone.includes("pc")) {
    general -= 4; redDot -= 4;
  }

  general = Math.max(75, Math.min(100, general));
  redDot = Math.max(70, Math.min(100, redDot));
  scope2x = Math.max(70, Math.min(100, scope2x));
  scope4x = Math.max(65, Math.min(100, scope4x));
  sniper = Math.max(60, Math.min(100, sniper));
  freeLook = Math.max(50, Math.min(100, freeLook));

  result.innerHTML = `
    <h3>Settings for ${phone.toUpperCase()}</h3>
    <p><b>General:</b> ${general}</p>
    <p><b>Red Dot:</b> ${redDot}</p>
    <p><b>2x Scope:</b> ${scope2x}</p>
    <p><b>4x Scope:</b> ${scope4x}</p>
    <p><b>Sniper:</b> ${sniper}</p>
    <p><b>Free Look:</b> ${freeLook}</p>
    <p style="color:#00ff88; font-size:13px; margin-top:15px;">💡 Your personal settings. Unique to you!</p>
  `;
 result.style.display = 'block';
}
</script>
