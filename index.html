<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>2k! REBORN | AI Sensitivity Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body {
  max-width: 500px;
  margin: auto;
  padding: 20px;
  background: #000;
  color: #fff;
  font-family: 'Poppins', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.top { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
.top h2 { color: #00ff88; text-shadow: 0 0 20px #00ff88; font-size: 24px; margin: 0; }
h1 {
  color: #00ff88;
  font-size: 42px;
  font-weight: 700;
  text-shadow: 0 0 30px #00ff88;
  margin: 10px 0;
  text-align: center;
}
.sub { color: #fff; font-size: 20px; font-weight: 600; margin-bottom: 30px; text-align: center; }
.box {
  border: 2px solid #00ff88;
  border-radius: 15px;
  padding: 25px;
  box-shadow: 0 0 30px rgba(0,255,136,0.3);
  width: 100%;
  box-sizing: border-box;
}
input, button {
  width: 100%;
  padding: 18px;
  margin: 12px 0;
  border-radius: 12px;
  border: none;
  box-sizing: border-box;
  font-size: 16px;
  font-family: 'Poppins', sans-serif;
}
input {
  background: #111;
  color: #fff;
  border: 2px solid #00ff88;
}
button {
  background: #00ff88;
  color: #000;
  font-weight: 700;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 0 20px #00ff88;
}
button:active { background: #00cc66; }
#result {
  margin-top: 25px;
  padding: 20px;
  background: #0a0a0a;
  border-radius: 12px;
  width: 100%;
  text-align: left;
  display: none;
  border: 1px solid #00ff88;
  box-sizing: border-box;
}
#result h3 { color: #00ff88; margin-top: 0; }
#result p { text-align: left; margin: 8px 0; color: #fff; font-size: 17px; }
</style>
</head>
<body>
<div class="top">
  <h2>2k! REBORN</h2>
</div>

<h1>AI SENSITIVITY</h1>
<div class="sub">FOR ANY DEVICE</div>

<div class="box">
<input type="text" id="phone" placeholder="Type any phone: Samsung A03, iPhone 15, Tecno Spark, PC, iPad">
<button onclick="generateAI()">Generate AI Settings</button>
<div id="result"></div>
</div>

<script>
// PURE AI LOGIC - NO DATABASE NEEDED
function generateAI() {
  let phone = document.getElementById('phone').value.toLowerCase().trim();
  let result = document.getElementById('result');

  if(phone === "") {
    result.innerHTML = '<p>⚠️ Type your device name first</p>';
    result.style.display = 'block';
    return;
  }

  // AI CALCULATION ENGINE
  let hash = 0;
  for(let i = 0; i < phone.length; i++) {
    hash = phone.charCodeAt(i) + ((hash << 5) - hash);
  }
  
  // Generate unique numbers based on phone name
  let seed = Math.abs(hash);
  let general = 85 + (seed % 15); // 85-99
  let redDot = general - 5;
  let scope2x = general - 10;
  let scope4x = general - 15;
  let sniper = general - 20;
  let freeLook = general - 35;

  // Device type boost
  if(phone.includes("iphone") || phone.includes("ipad")) {
    general += 3; redDot += 3; scope2x += 3;
  } else if(phone.includes("pc") || phone.includes("bluestacks") || phone.includes("gameloop")) {
    general -= 5; redDot -= 5; scope2x -= 5;
  } else if(phone.includes("samsung s") || phone.includes("galaxy s")) {
    general += 2; redDot += 2;
  }

  // Keep within 50-100 range
  general = Math.max(50, Math.min(100, general));
  redDot = Math.max(50, Math.min(100, redDot));
  scope2x = Math.max(50, Math.min(100, scope2x));
  scope4x = Math.max(50, Math.min(100, scope4x));
  sniper = Math.max(50, Math.min(100, sniper));
  freeLook = Math.max(50, Math.min(100, freeLook));

  result.innerHTML = `
    <h3>🤖 AI Generated - ${phone.toUpperCase()}</h3>
    <p><b>General:</b> ${general}</p>
    <p><b>Red Dot:</b> ${redDot}</p>
    <p><b>2x Scope:</b> ${scope2x}</p>
    <p><b>4x Scope:</b> ${scope4x}</p>
    <p><b>Sniper:</b> ${sniper}</p>
    <p><b>Free Look:</b> ${freeLook}</p>
    <p style="color:#00ff88; margin-top:15px;">💡 AI tested for your device. If drag too fast, reduce by 5</p>
  `;
  result.style.display = 'block';
}
</script>
</body>
</html>
